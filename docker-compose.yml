services:
  chrome:
    image: lscr.io/linuxserver/chrome:latest
    container_name: chrome
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - chrome_config:/config
    restart: unless-stopped
    networks:
      - proxy

volumes:
  chrome_config:

networks:
  proxy:
    external: true